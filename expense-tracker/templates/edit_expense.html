{% extends "base.html" %}

{% block title %}Edit Expense | Spendly{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-container">
        <div class="form-header">
            <h1>Edit Expense</h1>
            <p>Update your spending details below.</p>
        </div>

        <div class="form-card">
            <form method="POST">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" step="0.01" id="amount" name="amount" class="form-input" value="{{ expense.amount }}" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="Food" {% if expense.category == "Food" %}selected{% endif %}>Food & Dining</option>
                        <option value="Transport" {% if expense.category == "Transport" %}selected{% endif %}>Transportation</option>
                        <option value="Shopping" {% if expense.category == "Shopping" %}selected{% endif %}>Shopping</option>
                        <option value="Rent" {% if expense.category == "Rent" %}selected{% endif %}>Rent/Bills</option>
                        <option value="Entertainment" {% if expense.category == "Entertainment" %}selected{% endif %}>Entertainment</option>
                        <option value="Other" {% if expense.category == "Other" %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="form-input" value="{{ expense.date[:10] }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" name="description" class="form-input" rows="3" placeholder="What did you buy?">{{ expense.description }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Update Expense</button>
                    <a href="{{ url_for('dashboard') }}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
