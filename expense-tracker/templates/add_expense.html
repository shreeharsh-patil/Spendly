{% extends "base.html" %}

{% block title %}Add Expense | Spendly{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-container">
        <div class="form-header">
            <h1>Add New Expense</h1>
            <p>Log your spending details below.</p>
        </div>

        <div class="form-card">
            <form method="POST">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" step="0.01" id="amount" name="amount" class="form-input" placeholder="0.00" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Food">Food & Dining</option>
                        <option value="Transport">Transportation</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Rent">Rent/Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" name="description" class="form-input" rows="3" placeholder="What did you buy?"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Add Expense</button>
                    <a href="{{ url_for('dashboard') }}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
